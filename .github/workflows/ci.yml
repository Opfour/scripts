name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      # Pin actions to commit SHAs to prevent tag-hijack supply chain attacks
      # (ref: astral.sh/blog/open-source-security-at-astral)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Install dependencies
        run: uv sync

      # -- Ruff auto-fix pass --------------------------------------------------
      # Fixes what it can (unused imports, sort order, simple lint issues)
      # then formats. Changes are committed back to the PR branch.
      - name: Ruff lint (auto-fix)
        run: uv run ruff check --fix .

      - name: Ruff format
        run: uv run ruff format .

      - name: Commit auto-fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "style: auto-fix lint and format (ruff) [skip ci]"
            git push
          fi

      # -- Strict check pass ----------------------------------------------------
      # After fixes are applied, fail the build if anything unfixable remains.
      - name: Ruff lint (strict)
        run: uv run ruff check .

      - name: Ruff format check (strict)
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Install dependencies
        run: uv sync

      - name: Type check (ty)
        run: uv run ty check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-format
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v --tb=short
